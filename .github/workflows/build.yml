name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: himitsu_*_aarch64.dmg
            artifact_dir: bundle/dmg

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: 'himitsu_*.deb'
            artifact_dir: bundle/deb

          - os: windows-latest
            target: x86_64-pc-windows-gnu
            artifact: 'himitsu_*_x64-setup.exe'
            artifact_dir: bundle/nsis

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target }})

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Node ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ── Rust ──────────────────────────────────────────────────
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      # ── Linux system deps ──────────────────────────────────────
      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libgmp-dev \
            libsodium-dev \
            clang \
            libclang-dev \
            pkg-config

      # ── macOS system deps ──────────────────────────────────────
      - name: macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install gmp libsodium

      # ── Windows system deps (MSYS2) ───────────────────────────
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-libsodium
            mingw-w64-x86_64-openssl

      - name: Set MSYS2 env (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          MINGW_PREFIX=$(cygpath -m /mingw64)
          echo "GMP_LIB_DIR=${MINGW_PREFIX}/lib"                              >> $GITHUB_ENV
          echo "GMP_INCLUDE_DIR=${MINGW_PREFIX}/include"                      >> $GITHUB_ENV
          echo "SODIUM_LIB_DIR=${MINGW_PREFIX}/lib"                           >> $GITHUB_ENV
          echo "SODIUM_INCLUDE_DIR=${MINGW_PREFIX}/include"                   >> $GITHUB_ENV
          echo "SODIUM_STATIC=1"                                              >> $GITHUB_ENV
          echo "OPENSSL_DIR=${MINGW_PREFIX}"                                  >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=${MINGW_PREFIX}/include"                  >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=${MINGW_PREFIX}/lib"                          >> $GITHUB_ENV
          echo "CC_x86_64_pc_windows_gnu=${MINGW_PREFIX}/bin/gcc.exe"         >> $GITHUB_ENV
          echo "AR_x86_64_pc_windows_gnu=${MINGW_PREFIX}/bin/ar.exe"          >> $GITHUB_ENV
          echo "${MINGW_PREFIX}/bin"                                          >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=${MINGW_PREFIX}/lib/pkgconfig"                >> $GITHUB_ENV

      # ── CiFEr git submodule ────────────────────────────────────
      - name: Update CiFEr submodule
        run: git submodule update --init --recursive

      # ── Build ─────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Himitsu ${{ github.ref_name }}
          releaseBody: 'See the assets below to download this version of Himitsu.'
          releaseDraft: true
          prerelease: false
          appName: Himitsu
          appVersion: ${{ github.ref_name }}
          args: --target ${{ matrix.target }}
          tauriScript: npm run tauri

      # ── Upload artifacts ───────────────────────────────────────
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: himitsu-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/${{ matrix.artifact_dir }}/${{ matrix.artifact }}
          retention-days: 30

      - name: Upload RPM (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: himitsu-${{ matrix.target }}-rpm
          path: src-tauri/target/${{ matrix.target }}/release/bundle/rpm/himitsu-*.rpm
          retention-days: 30

