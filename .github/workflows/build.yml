name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: himitsu_*_aarch64.dmg
            artifact_dir: bundle/dmg

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: 'himitsu_*.deb'
            artifact_dir: bundle/deb

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: 'himitsu_*_x64-setup.exe'
            artifact_dir: bundle/nsis

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target }})

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Node ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ── Rust ──────────────────────────────────────────────────
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      # ── Linux system deps ──────────────────────────────────────
      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libgmp-dev \
            libsodium-dev \
            clang \
            libclang-dev \
            pkg-config

      # ── macOS system deps ──────────────────────────────────────
      - name: macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install gmp libsodium

      # ── Windows system deps ────────────────────────────────────
      - name: Windows system dependencies (vcpkg)
        if: runner.os == 'Windows'
        run: |
          vcpkg install gmp libsodium --triplet x64-windows-static-md

      - name: Set VCPKG env (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV
          echo "GMP_LIB_DIR=$VCPKG_INSTALLATION_ROOT/installed/x64-windows-static-md/lib" >> $GITHUB_ENV
          echo "SODIUM_LIB_DIR=$VCPKG_INSTALLATION_ROOT/installed/x64-windows-static-md/lib" >> $GITHUB_ENV
          echo "SODIUM_STATIC=1" >> $GITHUB_ENV

      # ── CiFEr git submodule ────────────────────────────────────
      - name: Update CiFEr submodule
        run: git submodule update --init --recursive

      # ── Build ─────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Point pkg-config at vcpkg on Windows
          PKG_CONFIG_PATH: ${{ runner.os == 'Windows' && format('{0}/installed/x64-windows-static-md/lib/pkgconfig', env.VCPKG_ROOT) || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Himitsu ${{ github.ref_name }}
          releaseBody: 'See the assets below to download this version of Himitsu.'
          releaseDraft: true
          prerelease: false
          appName: Himitsu
          appVersion: ${{ github.ref_name }}
          args: --target ${{ matrix.target }}

      # ── Upload artifacts ───────────────────────────────────────
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: himitsu-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/${{ matrix.artifact_dir }}/${{ matrix.artifact }}
          retention-days: 30
