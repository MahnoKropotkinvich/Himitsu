name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──────────────────────────────────────────────
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: himitsu_*_aarch64.dmg
            artifact_dir: bundle/dmg

          - os: macos-13
            target: x86_64-apple-darwin
            artifact: himitsu_*_x64.dmg
            artifact_dir: bundle/dmg

          # ── Linux ──────────────────────────────────────────────
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: 'himitsu_*.deb'
            artifact_dir: bundle/deb

          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: 'himitsu_*.deb'
            artifact_dir: bundle/deb

          # ── Windows ────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: 'himitsu_*_x64-setup.exe'
            artifact_dir: bundle/nsis

          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact: 'himitsu_*_arm64-setup.exe'
            artifact_dir: bundle/nsis

          # ── Android ─────────────────────────────────────────────
          - os: ubuntu-22.04
            target: aarch64-linux-android
            android: true

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target }})

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Node ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ── Rust ──────────────────────────────────────────────────
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}
          cache-on-failure: true

      # ── Linux system deps ──────────────────────────────────────
      - name: Linux system dependencies
        if: runner.os == 'Linux' && !matrix.android
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libgmp-dev \
            clang \
            libclang-dev \
            pkg-config \
            xdg-utils

      # ── macOS system deps ──────────────────────────────────────
      - name: macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install gmp
          echo "LIBRARY_PATH=$(brew --prefix)/lib" >> $GITHUB_ENV
          echo "CPATH=$(brew --prefix)/include" >> $GITHUB_ENV

      # ── Windows system deps (vcpkg + explicit cache save) ────
      - name: Set VCPKG_ROOT (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Restore vcpkg cache (Windows x64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        id: vcpkg-cache-x64
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-x64-windows-gmp-v1

      - name: Install GMP via vcpkg (Windows x64)
        if: matrix.target == 'x86_64-pc-windows-msvc' && steps.vcpkg-cache-x64.outputs.cache-hit != 'true'
        run: vcpkg install gmp:x64-windows-static-md

      - name: Save vcpkg cache (Windows x64)
        if: matrix.target == 'x86_64-pc-windows-msvc' && steps.vcpkg-cache-x64.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-x64-windows-gmp-v1

      - name: Set vcpkg env (Windows x64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          echo "GMP_LIB_DIR=$VCPKG_ROOT/installed/x64-windows-static-md/lib" >> $GITHUB_ENV
          echo "INCLUDE=$VCPKG_ROOT/installed/x64-windows-static-md/include" >> $GITHUB_ENV

      - name: Restore vcpkg cache (Windows arm64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        id: vcpkg-cache-arm64
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-arm64-windows-gmp-v1

      - name: Install GMP via vcpkg (Windows arm64)
        if: matrix.target == 'aarch64-pc-windows-msvc' && steps.vcpkg-cache-arm64.outputs.cache-hit != 'true'
        run: vcpkg install gmp:arm64-windows-static-md

      - name: Save vcpkg cache (Windows arm64)
        if: matrix.target == 'aarch64-pc-windows-msvc' && steps.vcpkg-cache-arm64.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-arm64-windows-gmp-v1

      - name: Set vcpkg env (Windows arm64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: bash
        run: |
          echo "GMP_LIB_DIR=$VCPKG_ROOT/installed/arm64-windows-static-md/lib" >> $GITHUB_ENV
          echo "INCLUDE=$VCPKG_ROOT/installed/arm64-windows-static-md/include" >> $GITHUB_ENV

      # ── Android system deps ─────────────────────────────────────
      - name: Android system dependencies
        if: matrix.android
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev m4

      - name: Setup Java (Android)
        if: matrix.android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK (Android)
        if: matrix.android
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;36.1.0 ndk;28.2.13676358'
          accept-android-sdk-licenses: true

      - name: Set Android env vars
        if: matrix.android
        shell: bash
        run: |
          NDK_HOME="$ANDROID_HOME/ndk/28.2.13676358"
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          echo "$TOOLCHAIN/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/build-tools/36.1.0" >> $GITHUB_PATH
          echo "TARGET_CC=$TOOLCHAIN/bin/aarch64-linux-android24-clang" >> $GITHUB_ENV
          echo "TARGET_AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV

      - name: Restore GMP cache (Android aarch64)
        if: matrix.android
        id: gmp-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/gmp-android-aarch64
          key: gmp-6.3.0-aarch64-linux-android-ndk28c-v2

      - name: Cross-compile GMP for Android aarch64
        if: matrix.android && steps.gmp-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          NDK=$ANDROID_HOME/ndk/28.2.13676358
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export CC=$TOOLCHAIN/bin/aarch64-linux-android24-clang
          export CXX=$TOOLCHAIN/bin/aarch64-linux-android24-clang++
          export AR=$TOOLCHAIN/bin/llvm-ar
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          PREFIX=/tmp/gmp-android-aarch64
          mkdir -p $PREFIX
          cd /tmp
          curl -fL --retry 5 --retry-delay 5 -o gmp-6.3.0.tar.xz https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz \
            || curl -fL --retry 5 --retry-delay 5 -o gmp-6.3.0.tar.xz https://gmplib.org/download/gmp/gmp-6.3.0.tar.xz
          echo "a3c2b80201b89e68616f4ad30bc66aee4927c3ce50e33929ca819d5c43538898  gmp-6.3.0.tar.xz" | sha256sum -c -
          tar xf gmp-6.3.0.tar.xz
          cd gmp-6.3.0
          ./configure \
            --host=aarch64-linux-android \
            --prefix=$PREFIX \
            --disable-shared \
            --enable-static
          make -j$(nproc)
          make install

      - name: Save GMP cache (Android aarch64)
        if: matrix.android && steps.gmp-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/gmp-android-aarch64
          key: gmp-6.3.0-aarch64-linux-android-ndk28c-v2

      - name: Set GMP env (Android)
        if: matrix.android
        shell: bash
        run: |
          echo "GMP_LIB_DIR=/tmp/gmp-android-aarch64/lib" >> $GITHUB_ENV
          echo "GMP_INCLUDE_DIR=/tmp/gmp-android-aarch64/include" >> $GITHUB_ENV

      # ── Build (Desktop) ─────────────────────────────────────────
      - name: Build Tauri app (Desktop)
        if: "!matrix.android"
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Himitsu ${{ github.ref_name }}
          releaseBody: 'See the assets below to download this version of Himitsu.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
          tauriScript: npm run tauri

      # ── Build (Android) ────────────────────────────────────────
      - name: Build Tauri app (Android)
        if: matrix.android
        run: npx tauri android build --target aarch64

      - name: Sign Android APK
        if: matrix.android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          APK_IN="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          APK_ALIGNED="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-aligned.apk"
          APK_OUT="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk"

          if [ ! -f "$APK_IN" ]; then
            echo "Android unsigned APK not found: $APK_IN" >&2
            exit 1
          fi

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            if [ -z "${ANDROID_KEY_ALIAS:-}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ]; then
              echo "ANDROID_KEY_ALIAS and ANDROID_KEYSTORE_PASSWORD are required when ANDROID_KEYSTORE_BASE64 is set" >&2
              exit 1
            fi
            KEYSTORE="$RUNNER_TEMP/himitsu-release.keystore"
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE"
            KEY_ALIAS="$ANDROID_KEY_ALIAS"
            STORE_PASS="$ANDROID_KEYSTORE_PASSWORD"
            KEY_PASS="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "Tagged Android releases require signing secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEY_ALIAS, ANDROID_KEYSTORE_PASSWORD, and optionally ANDROID_KEY_PASSWORD" >&2
            exit 1
          else
            KEYSTORE="$RUNNER_TEMP/himitsu-debug.keystore"
            KEY_ALIAS="androiddebugkey"
            STORE_PASS="android"
            KEY_PASS="android"
            keytool -genkeypair \
              -keystore "$KEYSTORE" \
              -storepass "$STORE_PASS" \
              -keypass "$KEY_PASS" \
              -alias "$KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          zipalign -f -p 4 "$APK_IN" "$APK_ALIGNED"
          apksigner sign \
            --ks "$KEYSTORE" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out "$APK_OUT" \
            "$APK_ALIGNED"
          apksigner verify --verbose "$APK_OUT"

      - name: Upload Android APK to GitHub Release
        if: matrix.android && startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          APK="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk"
          if [ ! -f "$APK" ]; then
            echo "Android APK not found: $APK" >&2
            exit 1
          fi

          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --draft --title "Himitsu $GITHUB_REF_NAME" --notes "See the assets below to download this version of Himitsu."

          gh release upload "$GITHUB_REF_NAME" "$APK#himitsu-${GITHUB_REF_NAME}-android-aarch64.apk" --clobber

      # ── Upload artifacts ───────────────────────────────────────
      - name: Upload bundle
        if: "!matrix.android"
        uses: actions/upload-artifact@v4
        with:
          name: himitsu-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/${{ matrix.artifact_dir }}/${{ matrix.artifact }}
          retention-days: 30

      - name: Upload RPM (Linux only)
        if: runner.os == 'Linux' && !matrix.android
        uses: actions/upload-artifact@v4
        with:
          name: himitsu-${{ matrix.target }}-rpm
          path: src-tauri/target/${{ matrix.target }}/release/bundle/rpm/himitsu-*.rpm
          retention-days: 30

      - name: Upload AppImage (Linux only)
        if: runner.os == 'Linux' && !matrix.android
        uses: actions/upload-artifact@v4
        with:
          name: himitsu-${{ matrix.target }}-appimage
          path: src-tauri/target/${{ matrix.target }}/release/bundle/appimage/himitsu_*.AppImage
          retention-days: 30

      - name: Upload APK (Android)
        if: matrix.android
        uses: actions/upload-artifact@v4
        with:
          name: himitsu-android-aarch64
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
          retention-days: 30
